server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:campus_events;DB_CLOSE_DELAY=-1
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  mail:
    host: smtp.example.com
    port: 587
    username: your-email@example.com
    password: your-email-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  security:
    jwtSecret: ${APP_SECURITY_JWTSECRET:change-this-dev-secret-at-least-32-chars-long}
    jwtExpirationMs: 3600000
  notifications:
    twilio:
      accountSid: YOUR_TWILIO_SID
      authToken: YOUR_TWILIO_TOKEN
      fromNumber: "+10000000000"

logging:
  level:
    org.hibernate.SQL: warn
    org.springframework.security: debug
    org.springframework.web.cors: debug
